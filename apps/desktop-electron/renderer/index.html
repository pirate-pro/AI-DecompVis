<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI-DecompVis Desktop</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 24px;
      }
      button {
        padding: 8px 12px;
      }
      pre {
        margin-top: 12px;
        background: #f5f5f5;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <h1>AI-DecompVis Desktop MVP</h1>
    <p>Web UI is not reachable yet. You can still pick a binary and run analysis via local backend.</p>
    <button id="pick">Pick PE File</button>
    <pre id="output"></pre>
    <script>
      const pick = document.getElementById("pick");
      const output = document.getElementById("output");
      pick.addEventListener("click", async () => {
        const file = await window.aidecompDesktop.pickBinary();
        if (!file) return;
        const backend = await window.aidecompDesktop.backendUrl();
        const sessionId = `desktop-${Date.now()}`;
        const res = await fetch(`${backend}/analysis/run`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            project_id: "desktop-default",
            session_id: sessionId,
            binary_path: file
          })
        });
        output.textContent = await res.text();
      });
    </script>
  </body>
</html>
